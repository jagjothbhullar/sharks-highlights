services:
  - type: web
    name: sharks-highlights-server
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd server && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sharks-highlights-db
          property: connectionString
      - key: BRIGHTCOVE_ACCOUNT_ID
        value: "6415718365001"
      - key: BRIGHTCOVE_POLICY_KEY
        sync: false
      - key: CLIENT_URL
        value: https://sharks-highlights-client.onrender.com

  - type: web
    name: sharks-highlights-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sharks-highlights-server.onrender.com

databases:
  - name: sharks-highlights-db
    plan: free
    region: oregon
